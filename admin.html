<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f0f2f5">
  <title>管理后台</title>
  <link rel="stylesheet" href="/styles/shared.css">
  <link rel="stylesheet" href="/styles/admin.css">
  <script>window.SENTRY_DSN=window.SENTRY_DSN||'';window.SENTRY_ENV=window.SENTRY_ENV||'production';</script>
  <script src="/utils/sentry.js"></script>
  <script src="/utils/frontend-utils.js"></script>
  <script src="/xlsx.full.min.js"></script>
</head>
<body style="min-height:100vh">
  <div class="container">
    <div id="loginOverlay" class="login-overlay">
      <div class="login-card">
        <h2>管理员登录</h2>
        <input type="text" id="adminUsername" placeholder="请输入管理员账号">
        <input type="password" id="adminPassword" placeholder="请输入密码">
        <button class="btn btn-primary login-btn" onclick="handleLogin()">立即登录</button>
        <div style="margin-top:16px;text-align:center">
          <a href="/" class="back-btn">返回首页</a>
        </div>
      </div>
    </div>

    <h1>管理后台</h1>
    <div class="nav-row">
      <a href="/" class="back-btn">首页</a>
      <a href="/dashboard.html" class="back-btn">数据看板</a>
      <a href="/records.html" class="back-btn">历史记录</a>
      <a href="/export.html" class="back-btn">数据导出</a>
      <button class="btn btn-outline" onclick="logout()" style="font-size:11px">退出登录</button>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="groups" onclick="switchTab('groups')">分组管理</button>
      <button class="admin-tab" data-tab="announcements" onclick="switchTab('announcements')">公告管理</button>
      <button class="admin-tab" data-tab="duty" onclick="switchTab('duty')">值班</button>
      <button class="admin-tab" data-tab="reward" onclick="switchTab('reward')">奖励</button>
      <button class="admin-tab" data-tab="warmup" onclick="switchTab('warmup')">预热</button>
      <button class="admin-tab" data-tab="settings" onclick="switchTab('settings')">系统设置</button>
    </div>

    <div id="panel-groups" class="admin-panel active">
      <div id="groupsList"></div>
    </div>

    <div id="panel-announcements" class="admin-panel">
      <div id="announcementsList"></div>
    </div>

    <div id="panel-duty" class="admin-panel">
      <div id="dutyList"></div>
    </div>

    <div id="panel-reward" class="admin-panel">
      <div id="rewardList"></div>
    </div>

    <div id="panel-warmup" class="admin-panel">
      <div id="warmupList"></div>
    </div>

    <div id="panel-settings" class="admin-panel">
      <div id="settingsInfo"></div>
    </div>
  </div>

  <div id="slotManager" class="modal-overlay" style="display:none">
    <div class="modal">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="margin:0">时段管理: <span id="slotGroupName"></span></h2>
        <button class="btn btn-outline" onclick="closeSlotManager()">关闭</button>
      </div>
      <input type="hidden" id="slotGroupId">
      <div id="slotsList"></div>
    </div>
  </div>

  <script src="/scripts/admin.js"></script>
</body>
</html>
