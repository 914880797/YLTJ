<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f0f2f5">
  <title>数据导出</title>
  <link rel="stylesheet" href="/styles/shared.css">
  <script>window.SENTRY_DSN=window.SENTRY_DSN||'';window.SENTRY_ENV=window.SENTRY_ENV||'production';</script>
  <script src="/utils/sentry.js"></script>
  <script src="/utils/frontend-utils.js"></script>
  <script src="/xlsx.full.min.js"></script>
</head>
<body style="height:100vh;display:flex;align-items:center;justify-content:center">
  <div class="container" style="width:70vw;height:90vh;display:flex;flex-direction:column;overflow:hidden;max-width:none">
    <h1>数据导出</h1>
    <div class="nav-row">
      <a href="/" class="back-btn">首页</a>
      <a href="/dashboard.html" class="back-btn">数据看板</a>
      <a href="/records.html" class="back-btn">历史记录</a>
      <a href="/admin.html" class="back-btn">管理后台</a>
    </div>

    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center">
      <button class="btn btn-primary" onclick="exportRankings()">导出排名 Excel</button>
      <input type="text" id="exportSearch" class="form-input" placeholder="搜索姓名定位..." style="width:200px;margin-bottom:0" oninput="filterExportTable()">
    </div>

    <div id="exportContent" style="height:0;flex-grow:1;overflow:auto">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <script src="/scripts/export.js"></script>
</body>
</html>
