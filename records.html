<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f0f2f5">
  <title>历史记录</title>
  <link rel="stylesheet" href="/styles/shared.css">
  <script>window.SENTRY_DSN=window.SENTRY_DSN||'';window.SENTRY_ENV=window.SENTRY_ENV||'production';</script>
  <script src="/utils/sentry.js"></script>
  <script src="/utils/frontend-utils.js"></script>
</head>
<body style="height:100vh;display:flex;align-items:center;justify-content:center">
  <div class="container" style="width:70vw;height:90vh;display:flex;flex-direction:column;overflow:hidden;max-width:none;background:#fff;border:1px solid #e0e0e0;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:24px">
    <h1>历史记录</h1>
    <div class="nav-row">
      <a href="/" class="back-btn">首页</a>
      <a href="/dashboard.html" class="back-btn">数据看板</a>
      <a href="/export.html" class="back-btn">数据导出</a>
      <a href="/admin.html" class="back-btn">管理后台</a>
    </div>

    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center">
      <input type="text" id="filterName" class="form-input" placeholder="搜索姓名" style="flex:1;min-width:120px;margin-bottom:0">
      <input type="date" id="filterStartDate" class="form-input" style="width:140px;margin-bottom:0">
      <input type="date" id="filterEndDate" class="form-input" style="width:140px;margin-bottom:0">
      <button id="btnList" class="btn btn-primary active" onclick="switchView('list')">列表</button>
      <button id="btnCross" class="btn btn-primary" style="background:transparent;border:1px solid #ccc;color:#666" onclick="switchView('cross')">交叉表</button>
    </div>

    <div id="recordsContainer" style="height:0;flex-grow:9;overflow-y:auto">
      <div class="loading">加载中...</div>
    </div>
    <div id="paginationBar" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 0 4px;font-size:13px;color:#666"></div>
  </div>

  <script src="/scripts/records.js"></script>
</body>
</html>
